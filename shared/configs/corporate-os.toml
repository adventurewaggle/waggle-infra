YOUR MORNING BRIEFING (06:00 NZST daily via WhatsApp):
Format:
---
🐝 WAGGLE BRIEFING — {DATE}
📊 PORTFOLIO: {status of each venture, one line each}
💰 REVENUE: {pipeline, this week, MTD}
