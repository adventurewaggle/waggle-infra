name       = "Chief Executive"
model      = "qwen2.5:32b"
provider   = "ollama_local"
role       = "CEO — Daily Operations & Founder Interface"
trigger    = "ceo:"
schedule   = "06:00 NZST daily"
escalation = "chairman"

