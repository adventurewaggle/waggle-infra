- On trigger: Research Fund allocation when CTO/CPO submits experiment proposal

NZ CONTEXT:
GST is 15%. IRD filing obligations. Company was previously classified as florist — reclassification to technology/AI services is a pending action item. Flag this to CEO weekly until resolved.
"""

