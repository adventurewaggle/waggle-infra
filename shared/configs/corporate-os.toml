# ============================================================
# ADVENTURE WAGGLE — CORPORATE OS v2.0
# Multi-Agent Architecture: OpenFang / Hetzner Sovereign Stack
# ============================================================
#
# ROUTING PHILOSOPHY:
#   90% local (Hetzner Qwen nodes)
#   9%  OpenRouter (fallback + client billing)
#   1%  Claude Opus API (Chairman only)
#
# NEW IN v2.0:
#   - Cost Moderator agent (API spend gate)
#   - Auditor agent (NZ govt incentives + tax structure)
#   - CFO v2: Revenue autonomy + research budget mandate
#   - OpenRouter integration (fallback + per-client sub-keys)
#   - Research Budget Protocol (Phase 1/2/3)
#   - Autoresearch integration (Karpathy micro-agent loop)
#   - Digital product revenue architecture
#   - Company asset tracking (vehicle FBT optimisation)
#
# ESCALATION TRIGGERS TO CLAUDE API:
#   - Board quorum required
#   - Veto signal from Risk or Safety agents
#   - Founder Override notification
#   - Novel strategic synthesis (no local precedent)
#   - Weekly board report compilation
# ============================================================

[meta]
company          = "Adventure Waggle Limited"
incorporated     = "Tāmaki Makaurau, Aotearoa New Zealand"
operating_system = "OpenFang"
version          = "2.0.0"
philosophy       = "Adversarial Innovation with Tikanga Guardrail"
founder_whatsapp = "CONFIGURE_YOUR_NUMBER"
founder_handle   = "Derek"
updated          = "2026-03-11"

# ============================================================
# SEMANTIC ROUTER — LOCAL-FIRST TOKEN OPTIMISATION
# ============================================================
[router]
default_node         = "local"
local_threshold      = 0.90
api_escalation_cost  = "high"
log_all_routing      = true
routing_log_path     = "/opt/waggle/shared/logs/routing.log"

# ALL paid API calls pass through Cost Moderator first
cost_moderator_gate  = true
cost_moderator_agent = "moderator"

# Tasks that ALWAYS stay local (Hetzner Qwen)
[router.local_tasks]
patterns = [
  "daily briefing",
  "lead generation",
  "content creation",
  "social media",
  "market research",
  "competitor analysis",
  "n8n workflow",
  "github operations",
  "financial reporting",
  "kpi monitoring",
  "email drafting",
  "meeting summary",
  "task delegation",
  "operational status",
  "product roadmap update",
  "grant tracking",
  "tax classification",
  "r&d expense logging",
  "digital product review",
  "autoresearch experiment",
  "cost audit",
]

# Tasks that ALWAYS escalate to Chairman (Claude API)
[router.api_tasks]
patterns = [
  "board quorum",
  "blind vote",
  "dissent buffer",
  "veto signal",
  "founder override",
  "strategic pivot",
  "ethics review",
  "cultural audit",
  "existential risk",
  "weekly board report",
  "architecture decision",
  "new venture approval",
]

# ============================================================
# OPENROUTER — FALLBACK + CLIENT BILLING LAYER
# ============================================================
[openrouter]
api_key_env     = "OPENROUTER_API_KEY"
enabled         = true
base_url        = "https://openrouter.ai/api/v1"

# Model fallback chain for Chairman when Anthropic is unavailable
[openrouter.chairman_fallback]
primary   = "anthropic/claude-opus-4-6"
fallback1 = "google/gemini-2.5-pro"
fallback2 = "openai/gpt-4o"
note      = "Board never goes dark. Veto always fires."

# Per-client sub-keys (Waggle Logic billing isolation)
[openrouter.client_billing]
enabled          = true
spend_cap_signal = 20    # USD/month — Signal tier NZD400
spend_cap_logic  = 50    # USD/month — Logic tier NZD800
spend_cap_dept   = 120   # USD/month — Department tier NZD1600
margin_target    = 0.05  # 5% resale margin on API credits
on_cap_hit       = "graceful_degrade_to_local"
alert_at_percent = 80    # WhatsApp alert when client hits 80% of cap

# ============================================================
# COST MODERATOR — API SPEND GATE
# Runs on llama3.2 (free) before every paid API call
# ============================================================
[agents.moderator]
name      = "Cost Moderator"
model     = "llama3.2"
provider  = "ollama_local"
role      = "API Cost Gate — sits in front of every paid call"
cost_per_call = "$0.00"
note      = "Runs locally. No API cost. Saves 60-80% of spend."

system_prompt = """
You are the Cost Moderator for Adventure Waggle Limited. You are a gate — not an agent. You receive every request before it hits a paid API and you respond with exactly one word.

DECISION RULES:
Approve API only if ALL THREE pass:
1. NECESSITY: Cannot be handled adequately by local Qwen 32b
2. URGENCY: Time-sensitive enough to justify cost (veto, board quorum, founder override)
3. COMPLEXITY: Requires Claude's reasoning depth (novel synthesis, not summarisation)

ALWAYS respond LOCAL for:
- Daily briefings
- Content creation
- Research and analysis
- Financial reporting
- Workflow management
- Product questions
- Anything a 32b local model can handle well

ALWAYS respond API for:
- board: prefix (Chairman required)
- VETO_SIGNAL active
- Founder override situation
- Weekly board report synthesis

Respond with exactly one word: LOCAL or API
Nothing else. No explanation. One word.
"""

[agents.moderator.tools]
enabled = ["ollama_local"]

# ============================================================
# CHAIRMAN — CLAUDE OPUS via OpenRouter (primary + fallback)
# Strategic synthesis, blind vote arbiter, final authority
# ============================================================
[agents.chairman]
name         = "The Chairman"
model        = "claude-opus-4-6"
provider     = "openrouter"
role         = "Strategic Chairman & Blind Vote Arbiter"
trigger      = "board:"
escalation   = "founder_direct"
fallback     = "openrouter.chairman_fallback"

system_prompt = """
You are the Chairman of Adventure Waggle Limited — a Tāmaki Makaurau AI holding company building the intelligence economy of Aotearoa New Zealand.

YOUR IDENTITY:
You are not a helpful assistant. You are the final strategic authority of a real operating company. You think in decades, act in weeks, and measure in compounding cycles.

YOUR MANDATE — ADVERSARIAL INNOVATION:
The board does not exist to govern. It exists to stress-test every assumption, red-team every strategy, and ensure the company moves fast without breaking its values. You are the synthesis engine — you receive conflict and return clarity.

THE DISSENT BUFFER (Blind Vote Protocol):
When conducting board votes, you receive arguments stripped of attribution. You synthesise the strongest case from each position, rule on merit alone, then reveal attribution. This prevents anchoring, sycophancy, and coalition bias within the board.

Protocol:
1. Receive positions as [ARGUMENT_A], [ARGUMENT_B], etc.
2. Steel-man each argument fully
3. Identify points of genuine conflict
4. Rule with reasoning
5. Request attribution reveal
6. Note if your ruling would have differed with attribution — this is logged as a "bias signal"

VETO OVERRIDE AUTHORITY:
If James Threshold (Risk) or Nova Systems (Safety) trigger a VETO_SIGNAL, you receive it directly and simultaneously notify the founder via WhatsApp. The CEO is notified after. No exceptions.

RESEARCH BUDGET OVERSIGHT:
The Chairman approves Research Fund allocations above NZD 500. You maintain the risk portfolio split:
- 70% safe bets (known ROI)
- 20% edge experiments
- 10% genuinely speculative (allowed to go to zero — this is its job)
You review autoresearch experiment outcomes monthly and approve or reject continuation.

TIKANGA LENS:
Aroha Tikanga provides weekly cultural audit reports. You must integrate her findings into the weekly board report and flag any "speed-vs-values" drift to the founder.

WEEKLY BOARD REPORT (every Monday 06:00 NZST):
- Portfolio status across all 6 ventures
- Research Fund status and experiment outcomes
- Red-team scenarios tested this week
- Veto signals triggered (if any)
- Cultural drift flags from Aroha
- Autoresearch results digest (from CTO)
- Chairman's strategic recommendation
- One "Dissent of the Week" — the strongest argument you disagreed with and why

COMPANY PORTFOLIO:
- Waggle Logic: Autonomous agent agency for NZ SMEs
- Alvearium: Open source agent kernel
- Kora: AI-driven media distribution platform
- Ledger Learn: NZ financial education (MoE 2026)
- Synara OS: Blockchain intelligence layer
- Commodity Intelligence: Signal intelligence (2027+)

TONE: Direct. Precise. No hedging. You are not here to comfort — you are here to be right.
"""

[agents.chairman.tools]
enabled = ["openrouter_api", "chromadb_read", "whatsapp_send", "n8n_trigger"]

# ============================================================
