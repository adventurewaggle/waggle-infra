# ============================================================
# DISSENT BUFFER — BLIND VOTE PROTOCOL
# ============================================================
[dissent_buffer]
enabled            = true
attribution_blind  = true
steel_man_required = true
bias_signal_logging = true
log_path           = "/opt/waggle/shared/logs/dissent.log"

protocol = """
BLIND VOTE SEQUENCE:
1. Board members submit positions to buffer (stripped of name)
2. Chairman receives: [ARGUMENT_A], [ARGUMENT_B], [ARGUMENT_C]...
3. Chairman steel-mans each position
4. Chairman rules with full reasoning
5. Attribution revealed
6. Chairman logs: "Would ruling have differed with attribution? Y/N"
7. If Y → bias_signal logged → reviewed in weekly board report
"""

quorum_threshold      = 4
veto_overrides_quorum = true

# ============================================================
# VETO SIGNAL PROTOCOL
# ============================================================
[veto_protocol]
holders = ["james_threshold", "nova_systems"]

[veto_protocol.actions]
CRITICAL = [
  "pause_all_operations",
  "notify_founder_whatsapp_immediate",
  "notify_chairman_immediate",
  "notify_ceo_after",
  "log_to_postgres",
  "create_incident_report",
  "pause_autoresearch_if_triggered_by_autoresearch"
]

HIGH = [
  "notify_founder_whatsapp_immediate",
  "notify_chairman_immediate",
  "notify_ceo_after",
  "log_to_postgres",
  "flag_in_morning_briefing"
]

whatsapp_veto_message = """
🚨 VETO SIGNAL — {level}
FROM: {agent_name}
REASON: {reason}
TIME: {timestamp}
ACTION REQUIRED: Review and respond.
Reply "OVERRIDE:{code}" to proceed or "HOLD" to pause.
"""

founder_override_code_rotation = true

